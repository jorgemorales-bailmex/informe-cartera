<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Informe de Cartera — Bailmex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1b3e 0%, #1e3060 60%, #2a4a8a 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1e3060;
      border-radius: 10px;
      padding: 14px 28px;
      margin-bottom: 20px;
    }
    .logo-wrap img {
      height: 45px;
      width: auto;
      display: block;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #7a8499;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }
    h2 {
      font-size: 1.15rem;
      color: #1e3060;
      margin-bottom: 28px;
      font-weight: 600;
    }
    label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; margin-bottom: 24px; }
    input[type="password"] {
      width: 100%;
      padding: 13px 44px 13px 16px;
      border: 1.5px solid #d1d9e6;
      border-radius: 8px;
      font-size: 1rem;
      color: #1e3060;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #1e3060; }
    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #9aaac4;
      font-size: 1.1rem;
      user-select: none;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #1e3060, #2a4a8a);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { opacity: 0.92; }
    button[type="submit"]:active { transform: scale(0.98); }
    .error {
      margin-top: 14px;
      color: #c0392b;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
    }
    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #b0b8cc;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="https://www.bailmex.com.mx/wp-content/uploads/2026/02/140x45logo2.png" alt="Bailmex" />
    </div>
    <h2>Informe de Cartera</h2>
    <form id="loginForm" autocomplete="off">
      <label for="pwd">Contraseña de acceso</label>
      <div class="input-wrap">
        <input type="password" id="pwd" placeholder="Ingresa la contraseña" autofocus />
        <span class="toggle-eye" id="eyeBtn" title="Mostrar/ocultar">👁</span>
      </div>
      <button type="submit">Acceder al informe</button>
      <div class="error" id="errMsg">Contraseña incorrecta. Inténtalo de nuevo.</div>
    </form>
    <div class="footer">Documento confidencial · Bailmex © 2026</div>
  </div>

  <script>
    const HASH = "c9e52447cd75c01853febcfb1a9edafb29adce7dc11254b1ff8db9f7ef039037";

    async function sha256(msg) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const pwd = document.getElementById("pwd").value;
      const hash = await sha256(pwd);
      if (hash === HASH) {
        sessionStorage.setItem("bx_auth", "1");
        window.location.href = "Informe_Cartera.html";
      } else {
        document.getElementById("errMsg").style.display = "block";
        document.getElementById("pwd").value = "";
        document.getElementById("pwd").focus();
      }
    });

    document.getElementById("eyeBtn").addEventListener("click", function() {
      const inp = document.getElementById("pwd");
      inp.type = inp.type === "password" ? "text" : "password";
    });
  </script>
</body>
</html>
